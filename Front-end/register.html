<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Robotronics Registration</title>
        <link rel="icon" type="image/png" href="/favicon.png" />
        <link rel="icon" type="image/webp" href="/logo.webp" />
        <link rel="preconnect" href="https://res.cloudinary.com" />
        <link
            rel="preload"
            href="https://res.cloudinary.com/drqqqhudz/image/upload/v1783427413/logo-optimized_evx5on.glb"
            as="fetch"
            crossorigin="anonymous"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
            rel="stylesheet"
        />
        <link href="style.css" rel="stylesheet" />
    </head>
    <body>
        <div class="logo-3d-wrap">
            <div class="logo-loader" id="logoLoader">Loading 3D logo...</div>
            <model-viewer
                id="logo3d"
                src="https://res.cloudinary.com/drqqqhudz/image/upload/v1783427413/logo-optimized_evx5on.glb"
                alt="RoboNexus 3D Logo"
                auto-rotate
                auto-rotate-delay="0"
                rotation-per-second="25deg"
                camera-controls
                interaction-prompt="none"
                loading="eager"
            ></model-viewer>
            <img
                id="logoFallback"
                class="logo-fallback"
                src="/logo.webp"
                alt="RoboNexus Logo"
            />
        </div>
        <script
            type="module"
            src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
        ></script>
        <h1>Register</h1>
        <form id="form">
            <label>Select Event *</label>
            <select id="event" required onchange="onEvent()">
                <option value="">Choose event</option>
                <option value="Robo War Sr." data-max="3">
                    Robo War Sr. (Grades IX–XII, 1–3 members)
                </option>
                <option value="Robo War Jr." data-max="3">
                    Robo War Jr. (Grades VI–VIII, 1–3 members)
                </option>
                <option value="Robo Soccer Sr." data-max="3">
                    Robo Soccer Sr. (Grades IX–XII, 1–3 members)
                </option>
                <option value="Robo Soccer Jr." data-max="3">
                    Robo Soccer Jr. (Grades VI–VIII, 1–3 members)
                </option>
                <option value="Line Follower" data-max="2">
                    Line Follower (Grades IV–VI, 1–2 members)
                </option>
                <option value="Robo Race" data-max="2">
                    Robo Race (Grades VI–VIII, 1–2 members)
                </option>
            </select>

            <div class="row">
                <div>
                    <label>Team Name *</label
                    ><input id="teamName" placeholder="Robo Nexus" required />
                </div>
                <div>
                    <label>Leader Name *</label
                    ><input id="leaderName" placeholder="Robo Nexus" required />
                </div>
            </div>

            <div class="row">
                <div>
                    <label>School *</label
                    ><input
                        id="school"
                        placeholder="Amity International School Sector 46"
                        required
                    />
                </div>
                <div>
                    <label>Email *</label
                    ><input
                        id="email"
                        type="email"
                        placeholder="robonexus.ais46@gmail.com"
                        required
                    />
                </div>
            </div>

            <div class="row">
                <div>
                    <label>Phone *</label
                    ><input
                        id="phone"
                        type="tel"
                        maxlength="10"
                        pattern="\d{10}"
                        placeholder="2222222222"
                        required
                    />
                </div>
                <div>
                    <label>Discord ID</label
                    ><input id="discordId" placeholder="robonexus#7777" />
                </div>
            </div>

            <label>Team Size *</label>
            <select id="size" required onchange="onSize()">
                <option value="">Choose size</option>
                <option value="1">1 member</option>
                <option value="2">2 members</option>
                <option value="3">3 members</option>
            </select>

            <div class="row">
                <div id="m2" style="display: none">
                    <label>Member 2 Full Name</label
                    ><input id="member2" placeholder="Robo_Nexus#2" />
                </div>
                <div id="m3" style="display: none">
                    <label>Member 3 Full Name</label
                    ><input id="member3" placeholder="Robo_Nexus#3" />
                </div>
            </div>

            <p id="msg"></p>
            <button type="submit" id="submitBtn">Continue</button>
        </form>
        <script src="index.js"></script>
    </body>
</html>
