<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>
<h1>Register</h1>
<form id="form">

<label>Select Event *</label>
<select id="event" required onchange="onEvent()">
<option value="">Choose event</option>
<option value="Robo War Sr." data-max="3">Robo War Sr. (Grades IX–XII, 1–3 members)</option>
<option value="Robo War Jr." data-max="3">Robo War Jr. (Grades VI–VIII, 1–3 members)</option>
<option value="Robo Soccer Sr." data-max="3">Robo Soccer Sr. (Grades IX–XII, 1–3 members)</option>
<option value="Robo Soccer Jr." data-max="3">Robo Soccer Jr. (Grades VI–VIII, 1–3 members)</option>
<option value="Line Follower" data-max="2">Line Follower (Grades IV–VI, 1–2 members)</option>
<option value="Robo Race" data-max="2">Robo Race (Grades VI–VIII, 1–2 members)</option>
</select>

<div class="row">
<div><label>Team Name *</label><input id="teamName" required></div>
<div><label>Leader Name *</label><input id="leaderName" placeholder="John Doe" required></div>
</div>

<div class="row">
<div><label>School *</label><input id="school" required></div>
<div><label>Email *</label><input id="email" type="email" required></div>
</div>

<div class="row">
<div><label>Phone *</label><input id="phone" type="tel" maxlength="10" pattern="\d{10}" required></div>
<div><label>Discord ID</label><input id="discordId"></div>
</div>

<label>Team Size *</label>
<select id="size" required onchange="onSize()">
<option value="">Choose size</option>
<option value="1">1 member</option>
<option value="2">2 members</option>
<option value="3">3 members</option>
</select>

<div class="row">
<div id="m2" style="display:none"><label>Member 2 Full Name</label><input id="member2"></div>
<div id="m3" style="display:none"><label>Member 3 Full Name</label><input id="member3"></div>
</div>

<p id="msg"></p>
<button type="submit" id="submitBtn">Continue</button>
</form>
<script src="index.js"></script>
</body>
</html>
