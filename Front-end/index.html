<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Register</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
            rel="stylesheet"
        />
        <link href="style.css" rel="stylesheet" />
    </head>
    <body>
        <h1>Register</h1>
        <form
            onsubmit="
                alert('Registered!');
                return false;
            "
        >
            <label>Select Event *</label>
            <select id="event" required onchange="onEvent()">
                <option value="">Choose event</option>
                <option data-max="3">
                    Robo War Sr. (Grades IX–XII, 1–3 members)
                </option>
                <option data-max="3">
                    Robo War Jr. (Grades VI–VIII, 1–3 members)
                </option>
                <option data-max="3">
                    Robo Soccer Sr. (Grades IX–XII, 1–3 members)
                </option>
                <option data-max="3">
                    Robo Soccer Jr. (Grades VI–VIII, 1–3 members)
                </option>
                <option data-max="2">
                    Line Follower (Grades IV–VI, 1–2 members)
                </option>
                <option data-max="2">
                    Robo Race (Grades VI–VIII, 1–2 members)
                </option>
            </select>

            <div class="row">
                <div><label>Team Name *</label><input required /></div>
                <div>
                    <label>Leader Name *</label
                    ><input placeholder="John Doe" required />
                </div>
            </div>

            <div class="row">
                <div><label>School *</label><input required /></div>
                <div><label>Email *</label><input type="email" required /></div>
            </div>

            <div class="row">
                <div>
                    <label>Phone *</label
                    ><input
                        type="tel"
                        maxlength="10"
                        pattern="\d{10}"
                        required
                    />
                </div>
                <div><label>Discord ID</label><input /></div>
            </div>

            <label>Team Size *</label>
            <select id="size" required onchange="onSize()">
                <option value="">Choose size</option>
                <option value="1">1 member</option>
                <option value="2">2 members</option>
                <option value="3">3 members</option>
            </select>

            <div class="row">
                <div id="m2" style="display: none">
                    <label>Member 2 Full Name</label><input />
                </div>
                <div id="m3" style="display: none">
                    <label>Member 3 Full Name</label><input />
                </div>
            </div>

            <button type="submit">Continue</button>
        </form>
        <script src="index.js"></script>
    </body>
</html>
